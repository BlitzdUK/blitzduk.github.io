      }

        flex-direction: column;
        align-items: center;
        justify-content: center;

        z-index: 2; 
      }

      .title {

      .isi {

      }

        margin: 30px;
        font-weight: 700;

        padding: 15px;
        text-transform: uppercase;
        color: #EE4B5E;
        border-radius: 26px;

        display: inline-block;
      }
      .buttons:hover {
        background-color: #EE4B5E;
        color: white;
        transition: all 0.2s ease-in-out;
      }

      /* --- Dense & Drifting Emoji Storm CSS --- */
      .emoji-rain-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none; 
        z-index: 1;
        overflow: hidden;
      }

      .emoji-drop {
        position: absolute;
        top: -60px; 
        font-size: var(--size);
        user-select: none;
        left: var(--left);
        /* Combining a falling speed variable with a separate side-to-side drift rhythm */
        animation: fall var(--speed) linear infinite, drift var(--drift-speed) ease-in-out infinite alternate;
        animation-delay: var(--delay);
        opacity: 0.35; /* Kept slightly dim so a massive amount doesn't overstimulate */
      }

      /* Vertical Falling Path */
      @keyframes fall {
        0% {
          transform: translateY(0) rotate(0deg);
          opacity: 0;
        }
        10% {
          opacity: 0.35;
        }
        90% {
          opacity: 0.35;
        }
        100% {
          transform: translateY(110vh) rotate(180deg);
          opacity: 0;
        }
      }

      /* Horizontal Drifting Movement (Creates the swaying/wind effect) */
      @keyframes drift {
        0% {
          margin-left: -30px;
        }
        100% {
          margin-left: 30px;
        }
      }
    </style>
  </head>

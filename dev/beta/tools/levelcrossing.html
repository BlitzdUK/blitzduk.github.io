<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UK Rail Level Crossing Lights</title>
    <style>
        /* Main container matching the visual style */
        .crossing {
            width: 220px;
            height: 180px;
            background: #000;
            border: 12px solid;
            border-image: repeating-conic-gradient(#fff 0% 25%, #d00 0% 50%) 2;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 12px;
            margin: 2rem auto;
        }

        /* LED base styling */
        .led {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #222;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.8);
            transition: background 0.02s ease, box-shadow 0.02s ease;
        }

        /* Amber LED */
        .led.amber.on {
            background: #ffd700;
            box-shadow: 0 0 18px #ffd700, inset 0 0 8px #ffec40;
        }

        /* Red LEDs */
        .led.red.on {
            background: #d00;
            box-shadow: 0 0 18px #ff2222, inset 0 0 8px #ff4444;
        }

        /* Control button */
        button {
            display: block;
            margin: 0 auto;
            padding: 8px 16px;
            font-size: 1rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="crossing">
        <div class="led amber" id="amberLed"></div>
        <div style="display: flex; gap: 30px;">
            <div class="led red" id="leftRed"></div>
            <div class="led red" id="rightRed"></div>
        </div>
    </div>

    <button id="startBtn">Start Sequence</button>
    <button id="stopBtn" style="margin-top: 8px;">Stop / Reset</button>

    <script>
        // Get elements
        const amberLed = document.getElementById('amberLed');
        const leftRed = document.getElementById('leftRed');
        const rightRed = document.getElementById('rightRed');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');

        let sequenceTimer = null;
        let flashingInterval = null;

        // Reset all LEDs
        function resetAll() {
            clearTimeout(sequenceTimer);
            clearInterval(flashingInterval);
            amberLed.classList.remove('on');
            leftRed.classList.remove('on');
            rightRed.classList.remove('on');
        }

        // Start the full sequence
        function startSequence() {
            resetAll();

            // Step 1: Amber ON for 3000ms
            amberLed.classList.add('on');
            sequenceTimer = setTimeout(() => {
                amberLed.classList.remove('on');

                // Step 2: All OFF for 50ms
                sequenceTimer = setTimeout(() => {
                    // Step 3: Begin alternating red flash cycle
                    flashingInterval = setInterval(() => {
                        // Right ON 50ms
                        rightRed.classList.add('on');
                        leftRed.classList.remove('on');

                        setTimeout(() => {
                            // All OFF 50ms
                            rightRed.classList.remove('on');

                            setTimeout(() => {
                                // Left ON 50ms
                                leftRed.classList.add('on');

                                setTimeout(() => {
                                    // All OFF 50ms
                                    leftRed.classList.remove('on');
                                }, 50);

                            }, 50);

                        }, 50);

                    }, 200); // Full cycle: 50+50+50+50 = 200ms

                }, 50);

            }, 3000);
        }

        // Attach controls
        startBtn.addEventListener('click', startSequence);
        stopBtn.addEventListener('click', resetAll);
    </script>
</body>
</html>

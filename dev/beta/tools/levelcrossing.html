<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UK Rail Crossing Wig-Wag Simulation</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #fcfade; /* Light cream background matching your image */
            font-family: Arial, sans-serif;
            margin: 0;
        }

        /* The overall assembly container including the post */
        .signal-assembly {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* The main black board with the checkered border */
        .crossing-board {
            position: relative;
            width: 320px;
            height: 200px;
            border: 24px solid;
            /* Creates the distinct red and white checkered pattern border */
            border-image: repeating-conic-gradient(#d92323 0% 12.5%, #ffffff 12.5% 25%) 24;
            background-color: #000000;
            border-radius: 16px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
            box-sizing: border-box;
            padding: 20px;
        }

        /* Container for the two top red lights */
        .red-lights-row {
            display: flex;
            justify-content: space-between;
            padding: 5px 20px 0 20px;
        }

        /* Universal lens styling */
        .lens {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            border: 3px solid #111;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.8);
            transition: background-color 0.1s ease, box-shadow 0.1s ease;
        }

        /* Default 'OFF' dark states */
        #led-left, #led-right {
            background-color: #500; /* Dark unlit red */
        }

        #led-amber {
            background-color: #530; /* Dark unlit amber */
            /* Positioned centered below the two red lights */
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Active 'ON' Glow States */
        .lens.on-red {
            background-color: #ff2200;
            box-shadow: 0 0 30px 8px #ff3300, inset 0 2px 4px rgba(255,255,255,0.6);
        }

        .lens.on-amber {
            background-color: #ff9900;
            box-shadow: 0 0 30px 8px #ffaa00, inset 0 2px 4px rgba(255,255,255,0.6);
        }

        /* Supporting post under the sign */
        .signal-post {
            width: 24px;
            height: 120px;
            background: linear-gradient(90deg, #b5b5b5 0%, #dbdbdb 30%, #a3a3a3 100%);
            border-left: 1px solid #888;
            border-right: 1px solid #666;
        }

        /* Control UI panel components */
        #info-panel {
            margin-top: 25px;
            text-align: center;
            width: 340px;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        #status-display {
            font-size: 1.2em;
            font-weight: bold;
            color: #222;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #timing-details {
            font-size: 0.85em;
            color: #555;
            line-height: 1.5;
            text-align: left;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 6px;
            border-left: 4px solid #ff9900;
        }

        #control-buttons {
            margin-top: 18px;
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: 0.95em;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        #start-button {
            background-color: #2e7d32;
            color: white;
        }
        #start-button:hover:not(:disabled) { background-color: #1b5e20; }

        #cancel-button {
            background-color: #c62828;
            color: white;
        }
        #cancel-button:hover:not(:disabled) { background-color: #b71c1c; }
        
        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="signal-assembly">
        <div class="crossing-board">
            <div class="red-lights-row">
                <div id="led-left" class="lens"></div>
                <div id="led-right" class="lens"></div>
            </div>
            <div id="led-amber" class="lens"></div>
        </div>
        <div class="signal-post"></div>
    </div>

    <div id="info-panel">
        <div id="status-display">System: Idle</div>
        <div id="timing-details">
            • <strong>Phase 1:</strong> Steady Amber lit for exactly 3.0s.<br>
            • <strong>Phase 2:</strong> Alternating red wig-wag flashes at ~75 FPM (400ms intervals) until canceled.
        </div>
        <div id="control-buttons">
            <button id="start-button" onclick="startCrossingSequence()">Trigger Train</button>
            <button id="cancel-button" onclick="triggerCancelSwitch()" disabled>Cancel Sequence</button>
        </div>
    </div>

    <script>
        const ledLeft = document.getElementById('led-left');
        const ledRight = document.getElementById('led-right');
        const ledAmber = document.getElementById('led-amber');
        const statusDisplay = document.getElementById('status-display');
        const startBtn = document.getElementById('start-button');
        const cancelBtn = document.getElementById('cancel-button');

        let wigWagTimer; 
        let cancelRequested = false;

        // Configuration matching standard UK protocol:
        const AMBER_DURATION = 3000; // 3 seconds steady amber
        const FLASH_RATE_MS = 400;   // 400ms per flash (~75 flashes/min, sits perfectly between 60-90)

        function updateStatus(text, color = '#222') {
            statusDisplay.textContent = `System: ${text}`;
            statusDisplay.style.color = color;
        }

        function clearAllLeds() {
            ledLeft.classList.remove('on-red');
            ledRight.classList.remove('on-red');
            ledAmber.classList.remove('on-amber');
        }

        function startCrossingSequence() {
            startBtn.disabled = true;
            cancelBtn.disabled = false;
            cancelRequested = false;
            clearAllLeds();

            // 1. Steady Amber turns on instantly for exactly 3 seconds
            ledAmber.classList.add('on-amber');
            updateStatus("Steady Amber (3s)", "#ff9900");

            setTimeout(() => {
                // If user hit cancel during the amber phase, abort moving to red
                if (cancelRequested) {
                    resetSystem();
                    return;
                }

                // 2. Extinguish Amber and immediately start alternating red wig-wags
                ledAmber.classList.remove('on-amber');
                updateStatus("Wig-Wag Flashing Red", "#ff2200");
                startWigWagLoop();

            }, AMBER_DURATION);
        }

        function startWigWagLoop() {
            let leftIsNext = true;

            // Execute first flash instantly upon transition
            runFlash(); 

            // Create loop interval
            wigWagTimer = setInterval(runFlash, FLASH_RATE_MS);

            function runFlash() {
                if (cancelRequested) {
                    resetSystem();
                    return;
                }

                clearAllLeds();
                if (leftIsNext) {
                    ledLeft.classList.add('on-red');
                } else {
                    ledRight.classList.add('on-red');
                }
                leftIsNext = !leftIsNext; // Alternates sequence
            }
        }

        function triggerCancelSwitch() {
            cancelRequested = true;
            cancelBtn.disabled = true;
            // If it's currently running the loop, the interval handles the exit.
            // If it's stuck in the initial amber delay, clear instantly:
            if (statusDisplay.textContent.includes("Amber")) {
                resetSystem();
            }
        }

        function resetSystem() {
            clearAllLeds();
            clearInterval(wigWagTimer);
            updateStatus("Idle", "#222");
            startBtn.disabled = false;
            cancelBtn.disabled = true;
            cancelRequested = false;
        }
    </script>

</body>
</html>
